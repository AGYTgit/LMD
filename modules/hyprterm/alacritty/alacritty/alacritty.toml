[window]
opacity = 0.85
blur = true

[[keyboard.bindings]]
key = "Space"
mods = "Control|Shift"
action = "ToggleViMode"

[[keyboard.bindings]]
mode = "Vi"
key = "Escape"
action = "ToggleViMode"

[font]
size = 12.0

[font.bold]
family = "JetBrains Mono Nerd Font"
style = "Bold"

[font.bold_italic]
family = "JetBrains Mono Nerd Font"
style = "Bold Italic"

[font.italic]
family = "JetBrains Mono Nerd Font"
style = "Italic"

[font.normal]
family = "JetBrains Mono Nerd Font"
style = "Regular"

[colors.primary]
background = '#060606'
foreground = '#cdd6f4' # text

[colors.normal]
black   = '#1e1e2e' # base
red     = '#f38ba8' # red
green   = '#a6e3a1' # green
yellow  = '#fab387' # peach
blue    = '#89b4fa' # blue
magenta = '#cba6f7' # mauve
cyan    = '#94e2d5' # teal
white   = '#cdd6f4' # text

[colors.bright]
black   = '#585b70' # Surface2
red     = '#f38ba8'
green   = '#a6e3a1'
yellow  = '#f9e2af'
blue    = '#89b4fa'
magenta = '#cba6f7'
cyan    = '#94e2d5'
white   = '#ffffff'

